<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>DRAGON QUEST d20</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; background:#000; color:#fff; font-family:'DotGothic16',monospace;
    overscroll-behavior:none; touch-action:manipulation;}
  #game{
    height:100dvh; display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    max-width:560px; margin:0 auto; user-select:none; -webkit-user-select:none;
  }

  .win{
    background:#000; border:3px solid #fff; border-radius:10px;
    box-shadow:inset 0 0 0 3px #000, inset 0 0 0 5px #fff;
    padding:10px 12px;
  }

  /* ステータスバー */
  #status{display:flex; justify-content:space-between; align-items:center;
    font-size:13px; margin:6px 6px 0; padding:8px 12px; line-height:1.4;}
  #status .hp{font-size:15px;}
  #status .hp.low{color:#ff8a3d;}
  #status .hp.dying{color:#ff5252;}

  /* メイン画面(フィールド/戦闘) */
  #screen{position:relative; flex:1; margin:6px; border:3px solid #fff; border-radius:10px;
    overflow:hidden; background:#000; touch-action:none; min-height:0;}
  #fieldCanvas{position:absolute; inset:0; width:100%; height:100%; image-rendering:pixelated;}
  #swipeHint{position:absolute; bottom:8px; left:0; right:0; text-align:center;
    font-size:11px; opacity:.55; pointer-events:none;}

  #battleView{position:absolute; inset:0; display:none; flex-direction:column;
    align-items:center; justify-content:center; background:#000;}
  #battleView.on{display:flex;}
  #enemySvg{width:min(58vw,240px); max-height:55%;}
  #enemyName{margin-top:8px; font-size:15px; letter-spacing:2px;}
  #enemyHp{margin-top:4px; font-size:13px; color:#ffd75e; letter-spacing:1px;}
  .shake{animation:shake .3s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .flash{animation:flash .25s;}
  @keyframes flash{50%{filter:invert(1)}}
  @media (prefers-reduced-motion:reduce){.shake,.flash{animation:none}}

  /* メッセージ窓: タップで送り */
  #msgWin{margin:0 6px; min-height:104px; font-size:15px; line-height:1.75;
    white-space:pre-wrap; position:relative;}
  #msgWin .d20{color:#ffd75e;}
  #msgWin .crit{color:#ff6b6b;}
  #msgWin .heal{color:#7ee787;}
  #msgWin .next{position:absolute; right:12px; bottom:6px; animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0}}

  /* コマンド: 大ボタン 2x2 親指ゾーン */
  #cmdArea{margin:6px; margin-bottom:max(6px, env(safe-area-inset-bottom));}
  #cmdGrid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .cbtn{
    background:#000; color:#fff; border:3px solid #fff; border-radius:10px;
    font-family:inherit; font-size:16px; padding:14px 4px; line-height:1.3;
    box-shadow:inset 0 0 0 2px #000, inset 0 0 0 4px #fff;
  }
  .cbtn small{display:block; font-size:10px; opacity:.65;}
  .cbtn:active{background:#fff; color:#000;}
  .cbtn:disabled{opacity:.3;}
  #cmdArea.hidden{visibility:hidden;}

  /* タイトル */
  #titleOverlay{position:fixed; inset:0; background:#000; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; text-align:center;}
  #titleOverlay h1{font-size:24px; letter-spacing:3px; line-height:1.8;}
  #titleOverlay .sub{font-size:12px; opacity:.7; line-height:1.8;}
  #titleOverlay .start{font-size:16px; border:3px solid #fff; border-radius:10px; padding:12px 28px;}
  #titleOverlay .start:active{background:#fff; color:#000;}
</style>
</head>
<body>
<div id="game">
  <div id="status" class="win"></div>

  <div id="screen">
    <canvas id="fieldCanvas"></canvas>
    <div id="swipeHint">スワイプで いどう(おしっぱなしで れんぞく)</div>
    <div id="battleView">
      <svg id="enemySvg" viewBox="0 0 100 80"></svg>
      <div id="enemyName"></div>
      <div id="enemyHp"></div>
    </div>
  </div>

  <div id="msgWin" class="win"></div>

  <div id="cmdArea" class="hidden">
    <div id="cmdGrid"></div>
  </div>

  <div id="titleOverlay">
    <h1>DRAGON QUEST<br><span style="font-size:15px">— d20 System Edition —</span></h1>
    <div class="sub">D&amp;D 3.5e ルール × ドラクエ様式<br>スマホMVP</div>
    <div class="start">▶ ぼうけんを はじめる</div>
  </div>
</div>

<script>
/* ============ ユーティリティ ============ */
const d = n => Math.floor(Math.random()*n)+1;
const mod = s => Math.floor((s-10)/2);
const $ = id => document.getElementById(id);

/* ============ プレイヤー (3.5e Fighter Lv1) ============ */
const P = {
  name:"ゆうしゃ",
  STR:16, DEX:13, CON:14,
  lv:1, bab:1, xp:0, gold:60, potions:3,
  maxHp:0, hp:0, x:2, y:7,
  get ac(){ return 10 + 3 + mod(this.DEX); },      // スケイル+DEX = AC14
  get atkMod(){ return this.bab + mod(this.STR); },
  get dmgMod(){ return mod(this.STR); },
};
P.maxHp = 10 + mod(P.CON); P.hp = P.maxHp;
const XP_TABLE = [0, 30, 80, 999];

/* ============ 敵 ============ */
const MONSTERS = {
  slime:  {name:"スライム",     ac:11, hp:()=>d(4)+1, atk:1, dmg:()=>d(4),   dmgTxt:"1d4",   init:0, xp:8,  gold:()=>d(6),   svg:"slime"},
  rat:    {name:"おおねずみ",   ac:12, hp:()=>d(6)+2, atk:2, dmg:()=>d(4)+1, dmgTxt:"1d4+1", init:2, xp:14, gold:()=>d(8)+2, svg:"rat"},
  ghost:  {name:"ゴースト",     ac:13, hp:()=>d(8)+3, atk:3, dmg:()=>d(6)+1, dmgTxt:"1d6+1", init:1, xp:22, gold:()=>d(10)+4,svg:"ghost"},
  dragon: {name:"りゅうおうのこ",ac:15, hp:()=>24,     atk:5, dmg:()=>d(8)+3, dmgTxt:"1d8+3", init:1, xp:0,  gold:()=>100,    svg:"dragon", boss:true},
};
const SVGS = {
  slime:`<path d="M50 15 Q78 15 80 55 Q80 68 50 68 Q20 68 20 55 Q22 15 50 15" fill="none" stroke="#4da6ff" stroke-width="3"/><circle cx="40" cy="42" r="3" fill="#fff"/><circle cx="60" cy="42" r="3" fill="#fff"/><path d="M42 55 Q50 60 58 55" fill="none" stroke="#fff" stroke-width="2"/>`,
  rat:`<ellipse cx="50" cy="48" rx="26" ry="16" fill="none" stroke="#c9a26b" stroke-width="3"/><circle cx="30" cy="34" r="9" fill="none" stroke="#c9a26b" stroke-width="3"/><circle cx="27" cy="33" r="2" fill="#fff"/><path d="M76 48 Q92 40 88 28" fill="none" stroke="#c9a26b" stroke-width="3"/><path d="M24 28 l-4 -8 M34 27 l2 -9" stroke="#c9a26b" stroke-width="3"/>`,
  ghost:`<path d="M50 12 Q75 12 75 45 L75 66 L67 58 L59 66 L50 58 L41 66 L33 58 L25 66 L25 45 Q25 12 50 12" fill="none" stroke="#b48cff" stroke-width="3"/><circle cx="41" cy="38" r="3" fill="#fff"/><circle cx="59" cy="38" r="3" fill="#fff"/><ellipse cx="50" cy="50" rx="4" ry="6" fill="#fff"/>`,
  dragon:`<path d="M50 10 L62 22 L74 18 L70 32 Q82 44 74 60 Q64 72 50 70 Q36 72 26 60 Q18 44 30 32 L26 18 L38 22 Z" fill="none" stroke="#ff6b6b" stroke-width="3"/><circle cx="42" cy="38" r="3" fill="#ffd75e"/><circle cx="58" cy="38" r="3" fill="#ffd75e"/><path d="M40 56 L46 52 L50 56 L54 52 L60 56" fill="none" stroke="#ff6b6b" stroke-width="2"/><path d="M14 40 Q6 30 14 20 M86 40 Q94 30 86 20" fill="none" stroke="#ff6b6b" stroke-width="2"/>`,
};

/* ============ マップ 12x9 ============ */
const MAP = [
"mmmmmmwwmmmm",
"mgggffwwfggm",
"mgcgffwwffgm",
"mggggfwwffgm",
"mgggggwwggvm",
"mggfffwwgggm",
"mggffggggggm",
"mgggggggfggm",
"mmmmmmmmmmmm",
].map(r=>r.split(""));
const TILE = {g:"#1a7a2e", f:"#0c4a1c", m:"#6b6b6b", c:"#c9b26b", v:"#3d2b56", w:"#1a4a8a"};
const ENC = {g:0.14, f:0.26};

/* ============ 状態 ============ */
let scene = "title";   // title | field | battle | msg | cmd | clear
let battle = null;
let msgQueue = [], msgDone = null;

/* ============ メッセージ ============ */
function say(lines, done){
  msgQueue = Array.isArray(lines)?lines.slice():[lines];
  msgDone = done||null;
  scene = "msg";
  hideCmds();
  nextMsg(true);
}
function nextMsg(first){
  if(!first && msgQueue.length===0){
    const cb = msgDone; msgDone=null;
    if(cb) cb(); else { scene = battle? "battle":"field"; if(!battle) fieldMsg(); }
    return;
  }
  const chunk = msgQueue.splice(0,3);
  $("msgWin").innerHTML = chunk.join("\n") +
    `<span class="next">${msgQueue.length? "▼":"▶"}</span>`;
}
function fieldMsg(){
  $("msgWin").innerHTML = "しろ(城)で やすめる。\nみなみひがしの どうくつに まおうが…";
}

/* ============ コマンドボタン ============ */
function showCmds(items, cb){
  scene = "cmd";
  const g = $("cmdGrid");
  g.innerHTML = "";
  items.forEach((c,i)=>{
    const b = document.createElement("button");
    b.className = "cbtn";
    b.innerHTML = c.label + (c.note? `<small>${c.note}</small>`:"");
    b.disabled = !!c.off;
    b.onclick = ()=>{ if(scene==="cmd") cb(i); };
    g.appendChild(b);
  });
  $("cmdArea").classList.remove("hidden");
}
function hideCmds(){ $("cmdArea").classList.add("hidden"); }

/* ============ ステータス ============ */
function renderStatus(){
  const r = P.hp/P.maxHp;
  const cls = r<=0.25? "hp dying" : r<=0.5? "hp low" : "hp";
  $("status").innerHTML =
    `<span>${P.name} Lv${P.lv}</span>` +
    `<span class="${cls}">HP ${P.hp}/${P.maxHp}</span>` +
    `<span>AC${P.ac} BAB+${P.bab}</span>` +
    `<span>${P.gold}G 草${P.potions}</span>`;
}

/* ============ フィールド描画(リサイズ対応) ============ */
const cv = $("fieldCanvas"), ctx = cv.getContext("2d");
function drawField(){
  const rect = cv.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio||1;
  cv.width = rect.width*dpr; cv.height = rect.height*dpr;
  const cols = MAP[0].length, rows = MAP.length;
  const tw = Math.min(cv.width/cols, cv.height/rows);
  const ox = (cv.width - tw*cols)/2, oy = (cv.height - tw*rows)/2;
  ctx.fillStyle="#000"; ctx.fillRect(0,0,cv.width,cv.height);
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
    ctx.fillStyle = TILE[MAP[y][x]];
    ctx.fillRect(ox+x*tw, oy+y*tw, tw-1, tw-1);
    if(MAP[y][x]==="c"||MAP[y][x]==="v"){
      ctx.fillStyle = MAP[y][x]==="c"? "#000":"#fff";
      ctx.font = `${tw*0.6}px DotGothic16`;
      ctx.fillText(MAP[y][x]==="c"?"城":"洞", ox+x*tw+tw*0.2, oy+y*tw+tw*0.72);
    }
  }
  ctx.fillStyle="#fff";
  ctx.fillRect(ox+P.x*tw+tw*0.28, oy+P.y*tw+tw*0.15, tw*0.44, tw*0.34);
  ctx.fillRect(ox+P.x*tw+tw*0.33, oy+P.y*tw+tw*0.5,  tw*0.34, tw*0.32);
}
window.addEventListener("resize", ()=>{ if(scene==="field") drawField(); });

/* ============ 移動 ============ */
function move(dx,dy){
  if(scene!=="field") return false;
  const nx=P.x+dx, ny=P.y+dy;
  if(nx<0||ny<0||ny>=MAP.length||nx>=MAP[0].length) return false;
  const t = MAP[ny][nx];
  if(t==="m"||t==="w") return false;
  P.x=nx; P.y=ny;
  drawField(); renderStatus();
  if(t==="c"){ castle(); return true; }
  if(t==="v"){ startBattle("dragon"); return true; }
  if(ENC[t] && Math.random()<ENC[t]){
    const pool = ["slime","slime","rat", ...(t==="f"?["rat","ghost"]:[])];
    startBattle(pool[Math.floor(Math.random()*pool.length)]);
  }
  return true;
}

/* ============ スワイプ移動(押しっぱなし連続) ============ */
let touchStart=null, repeatTimer=null, curDir=null;
const screenEl = $("screen");
function dirFromDelta(dx,dy){
  if(Math.abs(dx)<24 && Math.abs(dy)<24) return null;
  return Math.abs(dx)>Math.abs(dy) ? [Math.sign(dx),0] : [0,Math.sign(dy)];
}
screenEl.addEventListener("touchstart", e=>{
  if(scene==="battle"||scene==="msg"){ return; }
  touchStart = [e.touches[0].clientX, e.touches[0].clientY];
  curDir=null;
}, {passive:true});
screenEl.addEventListener("touchmove", e=>{
  if(!touchStart || scene!=="field") return;
  const t=e.touches[0];
  const dir = dirFromDelta(t.clientX-touchStart[0], t.clientY-touchStart[1]);
  if(dir && (!curDir || dir[0]!==curDir[0] || dir[1]!==curDir[1])){
    curDir = dir;
    move(dir[0],dir[1]);
    clearInterval(repeatTimer);
    repeatTimer = setInterval(()=>{
      if(scene!=="field"||!curDir){ clearInterval(repeatTimer); return; }
      move(curDir[0],curDir[1]);
    }, 200);
  }
}, {passive:true});
["touchend","touchcancel"].forEach(ev=>
  screenEl.addEventListener(ev, ()=>{ touchStart=null; curDir=null; clearInterval(repeatTimer); }));

/* メッセージ送り: 画面/メッセージ窓のタップ */
function tapAdvance(e){
  if(scene==="msg"){ nextMsg(); }
}
$("msgWin").addEventListener("click", tapAdvance);
screenEl.addEventListener("click", tapAdvance);

/* デスクトップ検証用キーボード */
window.addEventListener("keydown", e=>{
  const m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  if(m[e.key]){ e.preventDefault(); move(...m[e.key]); }
  if(e.key==="Enter"||e.key===" "||e.key==="z"){
    e.preventDefault();
    if(scene==="title") startGame(); else if(scene==="msg") nextMsg();
  }
});

/* ============ 城 ============ */
function castle(){
  P.hp = P.maxHp; renderStatus();
  say(["おうさま「よくきた ゆうしゃよ」","<span class='heal'>HPが ぜんかいふくした!</span>"], ()=>{
    if(P.gold>=20){
      $("msgWin").innerHTML = "しょうにん「やくそうは いらんかね?」\n(1つ 20ゴールド)";
      showCmds([{label:"かう", note:"20G"},{label:"かわない"}], i=>{
        hideCmds();
        if(i===0){ P.gold-=20; P.potions++; renderStatus(); say("やくそうを てにいれた!"); }
        else { scene="field"; fieldMsg(); }
      });
    } else { scene="field"; fieldMsg(); }
  });
}

/* ============ 戦闘 ============ */
function startBattle(key){
  const M = MONSTERS[key];
  battle = {name:M.name, ac:M.ac, hp:M.hp(), maxHp:0, atk:M.atk, dmg:M.dmg,
            dmgTxt:M.dmgTxt, init:M.init, xp:M.xp, gold:M.gold(), boss:M.boss};
  battle.maxHp = battle.hp;
  $("enemySvg").innerHTML = SVGS[M.svg];
  $("enemyName").textContent = M.name;
  renderEnemyHp();
  $("battleView").classList.add("on");
  scene = "battle";
  const pi=d(20), ei=d(20);
  const pT=pi+mod(P.DEX), eT=ei+battle.init;
  const first = pT>=eT;
  say([
    `${M.name}が あらわれた!`,
    `イニシアチブ! あなた <span class='d20'>[${pi}]</span>+${mod(P.DEX)}=${pT} / てき <span class='d20'>[${ei}]</span>+${battle.init}=${eT}`,
    first? "あなたの せんこう!" : "てきの せんこう!",
  ], ()=> first? playerMenu() : enemyTurn());
}
function renderEnemyHp(){
  const r = Math.max(0, battle.hp/battle.maxHp);
  const n = Math.ceil(r*8);
  $("enemyHp").textContent = "■".repeat(n) + "□".repeat(8-n);
}

function playerMenu(){
  $("msgWin").innerHTML = "コマンド?";
  showCmds([
    {label:"こうげき", note:`d20+${P.atkMod} / 1d8+${P.dmgMod}`},
    {label:"パワーアタック", note:"めいちゅう-2 / ダメージ+2"},
    {label:"やくそう", note:`のこり${P.potions} (1d8+1)`, off:P.potions<=0},
    {label:"にげる", off:battle.boss, note:battle.boss?"にげられない!":"DEXはんてい"},
  ], i=>{
    hideCmds();
    if(i===0) playerAttack(0,0);
    else if(i===1) playerAttack(-2,2);
    else if(i===2) usePotion();
    else tryFlee();
  });
}

function playerAttack(aAdj,dAdj){
  const roll=d(20), total=roll+P.atkMod+aAdj;
  const pa = aAdj? "(パワーアタック)":"";
  const lines=[`${P.name}の こうげき!${pa}`,
    `<span class='d20'>[d20:${roll}]</span> +${P.atkMod+aAdj} = ${total} vs AC${battle.ac}`];
  let hit=false;
  if(roll===20){
    const conf=d(20), confT=conf+P.atkMod+aAdj;
    const critHit = confT>=battle.ac;
    let dmg = d(8)+P.dmgMod+dAdj;
    if(critHit) dmg += d(8)+P.dmgMod+dAdj;
    lines.push(`<span class='crit'>20! クリティカルかくにん</span> <span class='d20'>[${conf}]</span>=${confT}`);
    lines.push(critHit? `<span class='crit'>かいしんの いちげき! ${dmg}のダメージ!</span>`
                      : `ヒット! ${dmg}のダメージ!`);
    battle.hp-=dmg; hit=true;
  } else if(roll===1){
    lines.push("ファンブル! おおきく それた!");
  } else if(total>=battle.ac){
    const dmg=d(8)+P.dmgMod+dAdj;
    lines.push(`ヒット! ${dmg}のダメージ! (1d8+${P.dmgMod+dAdj})`);
    battle.hp-=dmg; hit=true;
  } else lines.push("ミス! かわされた!");
  if(hit){ $("enemySvg").classList.add("shake");
    setTimeout(()=>$("enemySvg").classList.remove("shake"),350); renderEnemyHp(); }
  say(lines, ()=> battle.hp<=0? winBattle() : enemyTurn());
}

function usePotion(){
  P.potions--;
  const heal=d(8)+1;
  P.hp=Math.min(P.maxHp,P.hp+heal); renderStatus();
  say([`やくそうを つかった!`,`<span class='heal'>[1d8+1] HPが ${heal} かいふく!</span>`], enemyTurn);
}

function tryFlee(){
  const roll=d(20), total=roll+mod(P.DEX), dc=12+battle.init;
  const line=`にげだした! <span class='d20'>[d20:${roll}]</span>+${mod(P.DEX)}=${total} vs DC${dc}`;
  if(total>=dc) say([line,"うまく にげきれた!"], endBattleToField);
  else say([line,"まわりこまれてしまった!"], enemyTurn);
}

function enemyTurn(){
  const roll=d(20), total=roll+battle.atk;
  const lines=[`${battle.name}の こうげき!`,
    `<span class='d20'>[d20:${roll}]</span> +${battle.atk} = ${total} vs AC${P.ac}`];
  if(roll!==1 && (roll===20 || total>=P.ac)){
    let dmg=battle.dmg();
    if(roll===20){ const conf=d(20)+battle.atk;
      if(conf>=P.ac){ dmg*=2; lines.push(`<span class='crit'>クリティカル!</span>`);} }
    P.hp-=dmg;
    lines.push(`${P.name}は ${dmg}のダメージ! (${battle.dmgTxt})`);
    $("game").classList.add("flash");
    setTimeout(()=>$("game").classList.remove("flash"),300);
  } else lines.push(`${P.name}は みをかわした!`);
  renderStatus();
  say(lines, ()=> P.hp<=0? gameOver() : playerMenu());
}

function winBattle(){
  const lines=[`${battle.name}を たおした!`];
  if(battle.boss){
    endBattleView();
    say([...lines,"せかいに へいわが もどった!","── COMPLETE ── (3.5e MVP クリア!)"],
      ()=>{ scene="clear"; $("msgWin").innerHTML="── COMPLETE ──\nリロードで さいしょから"; });
    return;
  }
  P.xp+=battle.xp; P.gold+=battle.gold;
  lines.push(`けいけんち${battle.xp} ${battle.gold}ゴールド かくとく!`);
  while(P.lv<3 && P.xp>=XP_TABLE[P.lv]){
    P.lv++; P.bab++;
    const up=d(10)+mod(P.CON);
    P.maxHp+=up; P.hp=P.maxHp;
    lines.push(`<span class='heal'>レベル${P.lv}! BAB+1 / HP+${up} [1d10+${mod(P.CON)}]</span>`);
  }
  renderStatus();
  say(lines, endBattleToField);
}
function endBattleView(){ $("battleView").classList.remove("on"); }
function endBattleToField(){ battle=null; endBattleView(); scene="field"; drawField(); fieldMsg(); }

function gameOver(){
  say([`${P.name}は しんでしまった!`,"おうさま「しんでしまうとは なにごとだ!」","── しろで ふっかつ ──"], ()=>{
    P.hp=Math.ceil(P.maxHp/2); P.gold=Math.floor(P.gold/2);
    P.x=2; P.y=2; battle=null; endBattleView();
    renderStatus(); scene="field"; drawField(); fieldMsg();
  });
}

/* ============ 開始 ============ */
function startGame(){
  $("titleOverlay").style.display="none";
  scene="field";
  renderStatus(); drawField(); fieldMsg();
}
$("titleOverlay").addEventListener("click", startGame);
renderStatus();
</script>
